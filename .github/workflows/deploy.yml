name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 138.68.133.175
          username: root
          password: ${{ secrets.DEPLOY_PASSWORD }}
          command_timeout: 10m
          script: |
            cd /opt/qazaqbot
            git pull origin main

            # Rebuild strapi only if its files changed
            if git diff --name-only HEAD~1 HEAD | grep -q "^strapi/"; then
              echo "Strapi changed — rebuilding..."
              docker compose up -d --build strapi
            else
              echo "Strapi unchanged — skipping rebuild"
            fi

            # Always rebuild bot (fast, ~30 sec)
            docker compose up -d --build bot
